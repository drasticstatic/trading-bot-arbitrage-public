<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAPPU Arbitrage Screener</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-dark: #0a0b0f;
        --bg-card: #12141a;
        --bg-hover: #1a1d25;
        --border: #1e2028;
        --accent: #6366f1;
        --accent-glow: rgba(99, 102, 241, 0.3);
        --green: #10b981;
        --green-glow: rgba(16, 185, 129, 0.2);
        --red: #ef4444;
        --yellow: #f59e0b;
        --text: #f1f5f9;
        --text-muted: #64748b;
      }

      * { font-family: 'Space Grotesk', sans-serif; box-sizing: border-box; }
      body { background: var(--bg-dark); min-height: 100vh; color: var(--text); }

      /* Screener Card */
      .screener-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
      }

      .screener-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(99, 102, 241, 0.05) 0%, transparent 100%);
      }

      .screener-title {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .screener-title h2 {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
      }

      .screener-icon {
        font-size: 24px;
      }

      .live-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: var(--green);
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .live-dot {
        width: 6px;
        height: 6px;
        background: var(--green);
        border-radius: 50%;
        animation: pulse 1.5s infinite;
      }

      .screener-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .block-info {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 500;
      }

      .btn-test {
        background: rgba(245, 158, 11, 0.1);
        border: 1px solid rgba(245, 158, 11, 0.3);
        color: var(--yellow);
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-test:hover { background: rgba(245, 158, 11, 0.2); }

      .btn-clear {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--red);
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-clear:hover { background: rgba(239, 68, 68, 0.2); }

      .btn-restart {
        background: rgba(168, 85, 247, 0.1);
        border: 1px solid rgba(168, 85, 247, 0.3);
        color: #a855f7;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-restart:hover { background: rgba(168, 85, 247, 0.2); }

      .btn-refresh {
        background: var(--accent);
        color: white;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-refresh:hover { background: #5558e3; box-shadow: 0 0 20px var(--accent-glow); }

      .test-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(245, 158, 11, 0.15);
        border: 1px solid rgba(245, 158, 11, 0.3);
        color: var(--yellow);
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .test-dot {
        width: 6px;
        height: 6px;
        background: var(--yellow);
        border-radius: 50%;
        animation: pulse 1.5s infinite;
      }

      /* Stats Bar */
      .stats-bar {
        display: flex;
        padding: 16px 24px;
        gap: 32px;
        border-bottom: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.2);
      }

      .stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .stat-value {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
      }

      .stat-highlight .stat-value {
        color: var(--green);
      }

      .stat-label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Table */
      .table-wrapper {
        overflow-x: auto;
      }

      .screener-table {
        width: 100%;
        border-collapse: collapse;
      }

      .screener-table th {
        padding: 14px 24px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      .screener-table td {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
      }

      .screener-table tbody tr {
        cursor: pointer;
        transition: background 0.15s;
      }

      .screener-table tbody tr:hover {
        background: var(--bg-hover);
      }

      .row-selected {
        background: rgba(99, 102, 241, 0.1) !important;
        border-left: 3px solid var(--accent);
      }

      .row-opportunity {
        background: var(--green-glow) !important;
      }

      .pair-cell {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .pair-name {
        font-weight: 600;
        font-size: 14px;
      }

      .opp-indicator {
        width: 8px;
        height: 8px;
        background: var(--green);
        border-radius: 50%;
        animation: pulse 1s infinite;
        box-shadow: 0 0 10px var(--green);
      }

      .price-cell {
        font-family: 'SF Mono', 'Monaco', monospace;
        font-size: 13px;
        color: var(--text-muted);
        text-align: right;
      }

      .spread-cell {
        font-weight: 600;
        font-size: 14px;
        text-align: right;
        color: var(--text-muted);
      }

      .spread-positive { color: var(--green); }
      .spread-warn { color: var(--yellow); }

      .action-cell { text-align: center; }

      .trade-btn {
        background: linear-gradient(135deg, var(--green) 0%, #059669 100%);
        color: white;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 2px 10px rgba(16, 185, 129, 0.3);
      }

      .trade-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
      }

      .trade-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .trade-btn-secondary {
        background: rgba(100, 116, 139, 0.2);
        color: #94a3b8;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        border: 1px solid rgba(100, 116, 139, 0.3);
        cursor: pointer;
        transition: all 0.2s;
      }

      .trade-btn-secondary:hover {
        background: rgba(100, 116, 139, 0.3);
        color: #e2e8f0;
        border-color: rgba(100, 116, 139, 0.5);
      }

      .trade-btn-secondary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .trade-btn-confirm {
        background: linear-gradient(135deg, var(--yellow) 0%, #d97706 100%) !important;
        box-shadow: 0 2px 10px rgba(245, 158, 11, 0.4) !important;
        animation: pulse-confirm 0.5s infinite;
      }

      @keyframes pulse-confirm {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }

      .no-action { color: #2d3748; }

      /* Selected Panel */
      .selected-panel {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 24px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(16, 185, 129, 0.1) 100%);
        border-top: 1px solid var(--border);
      }

      .selected-pair {
        font-size: 18px;
        font-weight: 700;
      }

      .selected-meta {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 4px;
      }

      .execute-btn {
        background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
        color: white;
        padding: 14px 32px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 20px var(--accent-glow);
      }

      .execute-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px var(--accent-glow);
      }

      .execute-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .execute-btn-confirm {
        background: linear-gradient(135deg, var(--yellow) 0%, #d97706 100%) !important;
        box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4) !important;
        animation: pulse-confirm 0.5s infinite;
      }

      /* Footer */
      .screener-footer {
        padding: 12px 24px;
        text-align: center;
        font-size: 11px;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
      }

      /* Loading */
      .loading-state {
        padding: 60px;
        text-align: center;
        color: var(--text-muted);
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
      }

      .spinner-sm {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        display: inline-block;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

      /* Card */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }

      .text-muted { color: var(--text-muted); }

      /* Buttons */
      .btn-primary {
        background: var(--accent);
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 500;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-primary:hover { background: #5558e3; }

      .btn-success {
        background: var(--green);
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 600;
        border: none;
        cursor: pointer;
      }

      /* Input */
      .input-field {
        background: var(--bg-dark);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        color: var(--text);
        font-size: 14px;
        width: 100%;
      }
      .input-field:focus { outline: none; border-color: var(--accent); }

      /* Status */
      .status-green { color: var(--green); }
      .status-red { color: var(--red); }
      .status-yellow { color: var(--yellow); }

      /* Badge */
      .badge {
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
      }
      .badge-green { background: rgba(16, 185, 129, 0.15); color: var(--green); }
      .badge-red { background: rgba(239, 68, 68, 0.15); color: var(--red); }
      .badge-blue { background: rgba(99, 102, 241, 0.15); color: var(--accent); }

      /* Analysis Result Panel */
      .analysis-result {
        margin: 0 16px 16px;
        padding: 16px 20px;
        border-radius: 12px;
        border: 1px solid var(--border);
      }
      .analysis-result.profitable {
        background: rgba(16, 185, 129, 0.1);
        border-color: var(--green);
      }
      .analysis-result.not_profitable {
        background: rgba(239, 68, 68, 0.1);
        border-color: var(--red);
      }
      .analysis-result.no_opportunity {
        background: rgba(245, 158, 11, 0.1);
        border-color: var(--yellow);
      }
      .analysis-result.error {
        background: rgba(239, 68, 68, 0.15);
        border-color: var(--red);
      }
      .analysis-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }
      .analysis-icon { font-size: 20px; }
      .analysis-title {
        font-weight: 600;
        font-size: 15px;
        color: var(--text);
      }
      .analysis-message {
        color: var(--text-muted);
        font-size: 13px;
        margin-bottom: 12px;
      }
      .analysis-details {
        background: rgba(0,0,0,0.2);
        border-radius: 8px;
        padding: 12px;
      }
      .detail-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .detail-row:last-child { border-bottom: none; }
      .detail-row span:first-child { color: var(--text-muted); }
      .detail-row span:last-child { color: var(--text); font-weight: 500; }
      .text-green { color: var(--green) !important; }
      .text-red { color: var(--red) !important; }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-card); }
      ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

      /* Range Slider - Cross-browser compatible */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 8px;
        background: linear-gradient(to right, var(--green) 0%, var(--green) var(--value-percent, 50%), rgba(100, 116, 139, 0.3) var(--value-percent, 50%), rgba(100, 116, 139, 0.3) 100%);
        border-radius: 4px;
        outline: none;
        cursor: pointer;
      }

      /* Webkit (Chrome, Safari, Edge) */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(16, 185, 129, 0.4);
        border: 2px solid #fff;
        transition: transform 0.15s, box-shadow 0.15s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.1);
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.5);
      }

      /* Firefox */
      input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(16, 185, 129, 0.4);
        border: 2px solid #fff;
      }

      input[type="range"]::-moz-range-track {
        height: 8px;
        background: rgba(100, 116, 139, 0.3);
        border-radius: 4px;
      }

      input[type="range"]::-moz-range-progress {
        height: 8px;
        background: var(--green);
        border-radius: 4px;
      }

      /* Glass-morphism utilities */
      .glass {
        background: rgba(18, 20, 26, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .glass-light {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Bento grid */
      .bento-grid {
        display: grid;
        gap: 16px;
      }

      .bento-item {
        background: rgba(18, 20, 26, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 20px;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .bento-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      /* Gradient text */
      .gradient-text {
        background: linear-gradient(135deg, #a5b4fc 0%, #6ee7b7 50%, #fcd34d 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Soft glow effects */
      .glow-green { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
      .glow-purple { box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
      .glow-blue { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
